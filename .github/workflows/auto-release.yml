name: Auto release
on:
  push:
    branches: [ master ]
jobs:
  check-map-change:
    outputs:
      map_changed: ${{ steps.check_file_changed.outputs.map_changed }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - id: check_file_changed
        run: |
          echo "map_changed=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep map_master3.dat)" >> $GITHUB_OUTPUT
  process-map:
    runs-on: ubuntu-latest
    needs: [ check-map-change ]
    if: needs.check-map-change.outputs.map_changed == 'map_master3.dat'
    steps:
      - uses: actions/checkout@v3
      - run: yarn --cwd action
      - name: Download previous map
        continue-on-error: true
        run: gh release download --pattern map_master3.dat --output old_map.dat --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Capture commit author
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "COMMIT_TIMESTAMP=$(git log -1 --format=%cI)" >> $GITHUB_ENV
          # Real author = the PR author. Squash-merge stamps the *merger* as the
          # commit's git author, so resolve the pull request first and only fall
          # back to the commit author for direct pushes (no PR).
          LOGIN=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].user.login // empty')
          if [ -z "$LOGIN" ]; then
            LOGIN=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.author.login // empty')
          fi
          if [ -n "$LOGIN" ]; then
            NAME=$(gh api users/"$LOGIN" --jq '.name // empty')
            EMAIL=$(gh api users/"$LOGIN" --jq '.email // empty')
            [ -z "$NAME" ] && NAME="$LOGIN"
          else
            NAME=$(git log -1 --format=%an)
            EMAIL=$(git log -1 --format=%ae)
          fi
          echo "GIT_AUTHOR_LOGIN=$LOGIN" >> $GITHUB_ENV
          echo "GIT_AUTHOR_NAME=$NAME" >> $GITHUB_ENV
          echo "GIT_AUTHOR_EMAIL=$EMAIL" >> $GITHUB_ENV
      - id: release
        name: Bump version and release
        uses: rymndhng/release-on-push-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          bump_version_scheme: minor
          use_github_release_notes: true
          tag_prefix: ""
          release_name: "Release <RELEASE_VERSION>"
      - run: node action/process.js ${{ steps.release.outputs.tag_name }}
        id: process_map
      - name: Upload process map file to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: map_master3.dat
          asset_name: map_master3.dat
          tag: ${{ steps.release.outputs.tag_name }}
          overwrite: true
      - run: node action/strip-labels.js
      - name: Upload map without labels to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: map_master3_no_labels.dat
          asset_name: map_master3_no_labels.dat
          tag: ${{ steps.release.outputs.tag_name }}
          overwrite: true
      - run: node action/page.js
      - name: Upload reader files to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: page/data/*.json
          file_glob: true
          tag: ${{ steps.release.outputs.tag_name }}
          overwrite: true
      - name: Store change history
        run: node action/store-diff.mjs ${{ steps.release.outputs.tag_name }}
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
